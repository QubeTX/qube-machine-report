# Windows Installers — Corporate MSI + Global/Corporate EXE installers.
#
# Triggered AFTER cargo-dist's release.yml finishes publishing the GitHub
# Release. Uses `workflow_run` (not `release: published`) — see trigger
# block below for the GITHUB_TOKEN downstream-firing rule that bit v3.15.1.
#
# Hand-authored workflow — not generated by cargo-dist. We deliberately do
# NOT touch the auto-generated .github/workflows/release.yml; the only
# customization in that file is the small legacy installer-alias step
# permitted by `allow-dirty = ["ci"]` in Cargo.toml's
# [workspace.metadata.dist].
#
# Builds three artifacts per release:
#   - tr300-x86_64-pc-windows-msvc-corporate.msi  (perUser MSI from wix-corporate/corporate.wxs)
#   - tr300-x86_64-pc-windows-msvc-setup.exe       (perMachine EXE from inno/global.iss)
#   - tr300-x86_64-pc-windows-msvc-corporate-setup.exe  (perUser EXE from inno/corporate.iss)
# Plus a .sha256 sidecar for each.
#
# Sequencing:
#   release.yml (cargo-dist, tag push) → publishes the GitHub Release with
#       cargo-dist's 22 base assets, including the Global MSI.
#   ↓ (workflow_run trigger on Release completion)
#   windows-installers.yml (this file) → uploads the remaining 6 assets
#       (Corporate MSI + 2 EXEs + their .sha256 sidecars).
# Final release has 28 assets.
#
# If install paths or registry-marker values change in wix/*.wxs,
# wix-corporate/*.wxs, or inno/*.iss, update
# src/update.rs::detect_install_origin() in lockstep.

name: Windows Installers

# Triggered by workflow_run on Release workflow completion (the cargo-dist
# release.yml). The seemingly-simpler `release: types: [published]` trigger
# does NOT work here: cargo-dist's release.yml creates the GitHub Release
# via `gh release create` using the default GITHUB_TOKEN, and GitHub
# intentionally suppresses downstream workflow firing for events
# triggered by GITHUB_TOKEN-authenticated actions (loop prevention). This
# bit v3.15.1 — release.yml succeeded and the GitHub Release was
# published with 22 assets, but windows-installers.yml never fired.
# `workflow_run` is the documented pattern for "fire after another
# workflow completes" and isn't affected by the GITHUB_TOKEN rule.
# Same pattern as `crates-publish.yml` chains off `CI`.
#
# workflow_dispatch is also accepted so v3.15.1 (and any future release
# that needs the installers retroactively attached) can be manually
# triggered: `gh workflow run "Windows Installers" -f tag=v3.15.1`.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach installers to (e.g. v3.15.1)"
        required: true
        type: string

permissions:
  contents: write  # required for `gh release upload`

jobs:
  build-windows-installers:
    name: Build Corporate MSI + Global EXE + Corporate EXE
    runs-on: windows-2022
    # Filter:
    # - workflow_run path: only run when the Release workflow succeeded AND
    #   was triggered by a tag push (head_branch on tag-triggered runs is
    #   the tag name, which always starts with 'v' for this repo).
    # - workflow_dispatch path: always run (user provided the tag explicitly).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))

    steps:
      - name: Enable Windows long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Resolve target tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.event.workflow_run.head_branch }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag to start with 'v', got '$tag'"
          }
          $version = $tag -replace '^v', ''
          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Write-Host "Tag:     $tag"
          Write-Host "Version: $version"
          Write-Host "Event:   ${{ github.event_name }}"

      - name: Verify upstream cargo-dist release is complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          # Guard against a torn upstream release. cargo-dist's release.yml
          # uses a host-job gate that tolerates skipped matrix entries, so a
          # partially-failed release can still report conclusion=success.
          # Without this pre-flight, windows-installers.yml would build 6
          # assets and attach them to a release missing the Global MSI /
          # dist-manifest — leaving a torn release that users can't reliably
          # update from. (audit finding F20, v3.15.3+)
          #
          # We probe two sentinels:
          #   - dist-manifest.json   cargo-dist's own "all phases done"
          #                          signal, published as the final asset
          #                          of a complete run. Single-asset
          #                          contract decouples us from cargo-dist
          #                          output-naming details.
          #   - the Global MSI       the asset our 6 Windows installer
          #                          add-ons are functionally adjacent to.
          #                          If it's missing, attaching a Corporate
          #                          MSI would pretend the release is
          #                          complete when it isn't.
          $tag = "${{ steps.tag.outputs.tag }}"
          $repo = "${{ github.repository }}"
          Write-Host "Probing release $tag in $repo for upstream completion sentinels..."
          # Pass --repo explicitly: this step runs BEFORE actions/checkout,
          # so `gh` has no local git context to infer the repo from.
          $assets = (gh release view $tag --repo $repo --json assets --jq '.assets[].name') -split "`n"
          $required = @(
            "dist-manifest.json",
            "tr300-x86_64-pc-windows-msvc.msi"
          )
          $missing = @()
          foreach ($r in $required) {
            if ($assets -notcontains $r) { $missing += $r }
          }
          if ($missing.Count -gt 0) {
            Write-Host "Upstream cargo-dist release is incomplete. Missing assets:"
            $missing | ForEach-Object { Write-Host "    $_" }
            Write-Host ""
            Write-Host "This usually means a target build was skipped or failed in release.yml."
            Write-Host "Fix the upstream release (re-run release.yml, or attach the missing assets"
            Write-Host "manually) before re-firing this workflow via:"
            Write-Host "    gh workflow run 'Windows Installers' -f tag=$tag"
            exit 1
          }
          Write-Host "Upstream release looks complete (dist-manifest.json + Global MSI present)."

      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: false

      # rust-toolchain.toml at repo root pins channel=1.95 + rustfmt + clippy.
      # dtolnay/rust-toolchain@stable honors this file (channel pin wins over
      # the action's "stable" arg), so cargo-wix + Inno Setup get a Rust
      # version that matches the repo MSRV.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build tr300.exe (release)
        shell: pwsh
        run: cargo build --release --locked

      - name: Build Corporate MSI via bare candle + light
        shell: pwsh
        run: |
          # The Corporate MSI is built with WiX 3 candle/light directly (NOT
          # through cargo-wix). cargo-wix compiles every .wxs file in `wix/`
          # and links them into ONE MSI; putting corporate.wxs alongside
          # main.wxs hits LGHT0089/0091/0092 "Multiple entry sections" +
          # "Duplicate symbol" errors at link time. corporate.wxs lives in
          # wix-corporate/ (a separate directory) precisely so cargo-wix's
          # default scan of wix/ produces only the Global MSI cleanly.
          #
          # WiX 3.x is preinstalled on windows-2022 runners — the install
          # registers `$env:WIX` pointing at the install root. Standard paths:
          #   - $env:WIX\bin\candle.exe (compiler)
          #   - $env:WIX\bin\light.exe (linker)
          #
          # -sice:ICE38 / ICE64 / ICE91 suppress per-user MSI convention
          # violations from light. These ICEs require Components in user-
          # profile directories to have HKCU RegistryValue KeyPaths (not File
          # KeyPaths) and Directories to have RemoveFile/RemoveFolder
          # entries. For our single-binary install they're cosmetic — install
          # and uninstall both work correctly; the only consequence is an
          # empty `%LocalAppData%\Programs\tr300\bin\` folder left after
          # uninstall. Acceptable trade-off vs ~40 LOC of WiX boilerplate.
          $candle = "$env:WIX\bin\candle.exe"
          $light  = "$env:WIX\bin\light.exe"
          if (-not (Test-Path $candle)) { throw "candle.exe not found at $candle" }
          if (-not (Test-Path $light))  { throw "light.exe not found at $light" }

          New-Item -ItemType Directory -Force -Path target\wix | Out-Null

          # Quote -d... args. Without quotes, PowerShell parses
          # `-dVersion=3.15.1` as `-dVersion=3` followed by `.15.1` (the
          # dots in the version string break tokenization), so candle
          # ends up seeing `.15.1` as a source filename and errors with
          # CNDL0103. Quoting forces the whole assignment to be one
          # string literal.
          & $candle -arch x64 `
            "-dVersion=${{ steps.tag.outputs.version }}" `
            "-dCargoTargetBinDir=target\release" `
            -out target\wix\corporate.wixobj `
            wix-corporate\corporate.wxs
          if ($LASTEXITCODE -ne 0) { throw "candle failed with exit $LASTEXITCODE" }

          & $light -sice:ICE38 -sice:ICE64 -sice:ICE91 `
            -ext WixUIExtension `
            -out target\wix\tr300-x86_64-pc-windows-msvc-corporate.msi `
            target\wix\corporate.wixobj
          if ($LASTEXITCODE -ne 0) { throw "light failed with exit $LASTEXITCODE" }

          if (-not (Test-Path "target\wix\tr300-x86_64-pc-windows-msvc-corporate.msi")) {
            throw "Corporate MSI build failed — output file missing"
          }
          Write-Host "✓ Corporate MSI built"

      # Chocolatey is preinstalled on windows-2022 runners (see GitHub's
      # runner images docs). Installs Inno Setup 6 to
      # C:\Program Files (x86)\Inno Setup 6\.
      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress --no-color
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\iscc.exe")) {
            throw "Inno Setup install failed — iscc.exe missing"
          }
          Write-Host "✓ Inno Setup 6 installed"

      - name: Build Global EXE installer
        shell: pwsh
        run: |
          # /DMyAppVersion overrides the #define in inno/global.iss so the
          # version embedded in the EXE matches the release tag.
          # Quote /D... preprocessor define to survive PowerShell's
          # dot-aware tokenizer (same reason candle args are quoted above).
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" "/DMyAppVersion=${{ steps.tag.outputs.version }}" inno\global.iss
          if (-not (Test-Path "inno\Output\tr300-x86_64-pc-windows-msvc-setup.exe")) {
            throw "Global EXE installer build failed — output missing"
          }
          Write-Host "✓ Global EXE installer built"

      - name: Build Corporate EXE installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" "/DMyAppVersion=${{ steps.tag.outputs.version }}" inno\corporate.iss
          if (-not (Test-Path "inno\Output\tr300-x86_64-pc-windows-msvc-corporate-setup.exe")) {
            throw "Corporate EXE installer build failed — output missing"
          }
          Write-Host "✓ Corporate EXE installer built"

      - name: Compute SHA256 sidecars
        shell: pwsh
        run: |
          $files = @(
            "target\wix\tr300-x86_64-pc-windows-msvc-corporate.msi",
            "inno\Output\tr300-x86_64-pc-windows-msvc-setup.exe",
            "inno\Output\tr300-x86_64-pc-windows-msvc-corporate-setup.exe"
          )
          foreach ($f in $files) {
            $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
            $name = Split-Path $f -Leaf
            # Matches the cargo-dist sidecar format: lowercase-hex SHA256,
            # space, asterisk, filename. No trailing newline.
            $line = "$hash *$name"
            [System.IO.File]::WriteAllText("$f.sha256", $line)
            Write-Host "  $name  →  $hash"
          }

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          # --clobber so we can re-run this workflow if the release upload
          # fails mid-flight without manually deleting old assets first.
          gh release upload "${{ steps.tag.outputs.tag }}" `
            "target\wix\tr300-x86_64-pc-windows-msvc-corporate.msi" `
            "target\wix\tr300-x86_64-pc-windows-msvc-corporate.msi.sha256" `
            "inno\Output\tr300-x86_64-pc-windows-msvc-setup.exe" `
            "inno\Output\tr300-x86_64-pc-windows-msvc-setup.exe.sha256" `
            "inno\Output\tr300-x86_64-pc-windows-msvc-corporate-setup.exe" `
            "inno\Output\tr300-x86_64-pc-windows-msvc-corporate-setup.exe.sha256" `
            --clobber
          Write-Host "✓ Uploaded 6 assets to ${{ steps.tag.outputs.tag }}"
