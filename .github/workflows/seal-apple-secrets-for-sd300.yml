name: Seal Apple secrets for SD-300

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seal:
    name: Seal fixed Apple credentials
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SD300_ACTIONS_PUBLIC_KEY: xB7ytPpCN7wznfvuMBjvw9mdZsHceKgcyJUiUaawfD8=
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
    steps:
      - name: Seal credentials to the SD-300 repository key
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --quiet 'PyNaCl==1.5.0'
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          from nacl.public import PublicKey, SealedBox

          names = (
              "APPLE_CERTIFICATE_P12_BASE64",
              "APPLE_CERTIFICATE_PASSWORD",
              "APPLE_API_ISSUER_ID",
          )
          missing = [name for name in names if not os.environ.get(name)]
          if missing:
              raise SystemExit("Required source secrets are unavailable")

          public_key = PublicKey(base64.b64decode(os.environ["SD300_ACTIONS_PUBLIC_KEY"]))
          sealed_box = SealedBox(public_key)
          payload = {
              name: base64.b64encode(
                  sealed_box.encrypt(os.environ[name].encode("utf-8"))
              ).decode("ascii")
              for name in names
          }
          destination = Path(os.environ["RUNNER_TEMP"]) / "sd300-apple-secrets.json"
          destination.write_text(json.dumps(payload, sort_keys=True), encoding="utf-8")
          PY

      - name: Upload sealed credentials
        uses: actions/upload-artifact@v4
        with:
          name: sd300-sealed-apple-secrets
          path: ${{ runner.temp }}/sd300-apple-secrets.json
          if-no-files-found: error
          retention-days: 1
