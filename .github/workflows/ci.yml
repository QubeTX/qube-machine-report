name: CI

# Quality gate for every commit and PR. Complements the cargo-dist
# release.yml workflow (which only runs on tag push to ship binaries).
#
# Jobs:
#   fmt        — cargo fmt --check (Linux only; rustfmt is platform-agnostic)
#   clippy     — cargo clippy --all-targets -- -D warnings (Linux only)
#   test       — cargo test --workspace (Linux glibc + macOS ARM + Windows)
#   build      — cargo build --release smoke test on every supported target
#   speed      — measure tr300 --fast median wall-clock; fail above 1500 ms
#   audit      — cargo-audit (blocking dependency-advisory gate)
#   dist-plan  — verify cargo-dist plan parses (catches dist config errors before tagging)
#   installers — compile both WiX and both Inno sources before any tag exists

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Treat warnings during compilation as errors (clippy enforces its own).
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --all-targets --workspace -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: "Linux x86_64 glibc"
          - os: ubuntu-22.04-arm
            name: "Linux ARM64 glibc"
          - os: macos-15
            name: "macOS ARM (Apple Silicon)"
          - os: macos-15-intel
            name: "macOS Intel"
          - os: windows-latest
            name: "Windows x86_64"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --workspace --all-targets

  build:
    name: Release Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: "Linux x86_64 glibc"
          - os: ubuntu-22.04-arm
            name: "Linux ARM64 glibc"
          - os: macos-15
            name: "macOS ARM (Apple Silicon)"
          - os: macos-15-intel
            name: "macOS Intel"
          - os: windows-latest
            name: "Windows x86_64"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release --workspace
      - name: Smoke test (--version)
        shell: bash
        run: |
          BIN="./target/release/tr300"
          [ "${{ runner.os }}" = "Windows" ] && BIN="./target/release/tr300.exe"
          "$BIN" --version
          "$BIN" --fast --json | head -5

  speed:
    name: Auto-run speed (${{ matrix.name }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: "Linux"
            budget_ms: 1500
          - os: macos-latest
            name: "macOS ARM"
            budget_ms: 1500
          - os: windows-latest
            name: "Windows"
            budget_ms: 1500
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release --bin tr300

      - name: Time tr300 --fast (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN="./target/release/tr300"
          # Warm-up
          "$BIN" --fast >/dev/null
          # 5 timed runs
          times=()
          for i in 1 2 3 4 5; do
            start=$(date +%s%N)
            "$BIN" --fast >/dev/null
            end=$(date +%s%N)
            elapsed=$(( (end - start) / 1000000 ))
            times+=("$elapsed")
            echo "Run $i: ${elapsed}ms"
          done
          median=$(printf '%s\n' "${times[@]}" | sort -n | sed -n '3p')
          budget_ms="${{ matrix.budget_ms }}"
          echo "Median: ${median}ms"
          {
            echo "## tr300 --fast on ${{ matrix.name }}"
            echo ""
            echo "Runs: ${times[*]} (ms)"
            echo "Median: **${median}ms** (budget: ${{ matrix.budget_ms }}ms)"
          } >> "$GITHUB_STEP_SUMMARY"
          if (( median > budget_ms )); then
            echo "::error::--fast median ${median}ms exceeds ${{ matrix.budget_ms }}ms budget"
            exit 1
          fi

      - name: Time tr300 --fast (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = ".\target\release\tr300.exe"
          # Warm-up
          & $bin --fast | Out-Null
          # 5 timed runs
          $times = @()
          for ($i = 1; $i -le 5; $i++) {
            $sw = [System.Diagnostics.Stopwatch]::StartNew()
            & $bin --fast | Out-Null
            $sw.Stop()
            $elapsed = [int]$sw.Elapsed.TotalMilliseconds
            $times += $elapsed
            Write-Host "Run $i`: ${elapsed}ms"
          }
          $sorted = $times | Sort-Object
          $median = $sorted[2]
          Write-Host "Median: ${median}ms"
          $summary = @"
          ## tr300 --fast on ${{ matrix.name }}

          Runs: $($times -join ', ') (ms)
          Median: **${median}ms** (budget: ${{ matrix.budget_ms }}ms)
          "@
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
          if ($median -gt ${{ matrix.budget_ms }}) {
            Write-Error "--fast median ${median}ms exceeds ${{ matrix.budget_ms }}ms budget"
            exit 1
          }

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - run: cargo audit

  dist-plan:
    name: cargo-dist plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-dist v0.31.0
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
      - name: Verify dist plan parses
        run: ~/.cargo/bin/dist plan

  workflow-validation:
    name: Workflow and shell validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Validate GitHub Actions workflows
        run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "$actionlint_bin"
      - name: Validate release shell scripts
        run: shellcheck scripts/*.sh
      - name: Guard supplemental packaging lifecycle invariants
        shell: bash
        run: |
          set -euo pipefail
          workflow=.github/workflows/macos-installer.yml
          builder=scripts/build-sign-notarize-macos-dmg.sh
          windows_validation=.github/workflows/windows-installer-validation.yml
          updater=src/update.rs
          inno_msi_bridge=inno/remove-conflicting-msi.pas
          checkout_line=$(grep -nF 'name: Checkout exact release tag' "$workflow" | cut -d: -f1)
          download_line=$(grep -nF 'name: Verify upstream release and download signed architecture archives' "$workflow" | cut -d: -f1)
          test -n "$checkout_line"
          test -n "$download_line"
          test "$checkout_line" -lt "$download_line"
          grep -Fqx "lipo \"\$universal\" -verify_arch arm64 x86_64" "$builder"
          grep -Fqx '          lipo /usr/local/bin/tr300 -verify_arch arm64 x86_64' "$workflow"
          if grep -Eq '^[[:space:]]*lipo[[:space:]]+-verify_arch' "$builder" "$workflow"; then
            echo 'input-last lipo -verify_arch invocation is forbidden' >&2
            exit 1
          fi
          if grep -Fq 'pkgutil --verify' "$workflow" "$updater"; then
            echo 'removed pkgutil --verify must not return to runtime or hosted validation' >&2
            exit 1
          fi
          grep -Fq 'pkgutil --file-info /usr/local/bin/tr300' "$workflow"
          grep -Fq 'codesign --verify --strict --verbose=4 /usr/local/bin/tr300' "$workflow"
          grep -Fq 'TeamIdentifier=${{ vars.APPLE_TEAM_ID }}' "$workflow"
          grep -Fq 'github.event.workflow_run.head_sha' "$windows_validation"
          if grep -Fq 'github.event.workflow_run.head_branch' "$windows_validation"; then
            echo 'second-hop workflow validation must resolve from head_sha, not head_branch' >&2
            exit 1
          fi
          grep -Fq 'previous_tag' "$windows_validation"
          grep -Fq 'previous_version' "$windows_validation"
          if grep -Fq 'Start-Process powershell.exe' "$windows_validation"; then
            echo 'pwsh-hosted cargo-dist validation must not inherit modules into Windows PowerShell' >&2
            exit 1
          fi
          if grep -Eq 'var[[:space:]]+ProductCode:[[:space:]]*string' "$inno_msi_bridge"; then
            echo 'MsiEnumRelatedProductsW output buffer must not use Pascal Script var' >&2
            exit 1
          fi

  windows-installer-sources:
    name: Windows installer source gate
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        shell: pwsh
        run: cargo build --locked --release --bin tr300
      - name: Compile Global and Corporate MSI sources
        shell: pwsh
        run: |
          $candle = "$env:WIX\bin\candle.exe"
          $light = "$env:WIX\bin\light.exe"
          if (-not (Test-Path $candle)) { throw "candle.exe not found at $candle" }
          if (-not (Test-Path $light)) { throw "light.exe not found at $light" }
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          New-Item -ItemType Directory -Force target\wix-ci | Out-Null
          function Build-Msi([string] $source, [string] $name, [string] $packageVersion) {
            $object = "target\wix-ci\$name.wixobj"
            $output = "target\wix-ci\$name.msi"
            & $candle -arch x64 "-dVersion=$packageVersion" `
              "-dCargoTargetBinDir=target\release" -out $object $source
            if ($LASTEXITCODE -ne 0) { throw "candle failed for $source" }
            & $light -sice:ICE38 -sice:ICE64 -sice:ICE91 `
              -ext WixUIExtension -out $output $object
            if ($LASTEXITCODE -ne 0) { throw "light failed for $source" }
            if (-not (Test-Path $output)) { throw "missing $output" }
          }
          Build-Msi 'wix\main.wxs' 'global-current' $version
          Build-Msi 'wix\main.wxs' 'global-same-version-fixture' $version
          Build-Msi 'wix\main.wxs' 'global-newer-fixture' '99.0.0'
          Build-Msi 'wix-corporate\corporate.wxs' 'corporate-current' $version
          Build-Msi 'wix-corporate\corporate.wxs' 'corporate-same-version-fixture' $version
          Build-Msi 'wix-corporate\corporate.wxs' 'corporate-newer-fixture' '99.0.0'
      - name: Prove fresh older and same-version MSIs replace registered MSIs
        shell: pwsh
        run: |
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          $cases = @(
            @{ Name = 'global'; Display = 'tr300'; Exe = "$env:ProgramFiles\tr300\bin\tr300.exe" },
            @{ Name = 'corporate'; Display = 'tr300 (Corporate Edition)'; Exe = "$env:LOCALAPPDATA\Programs\tr300\bin\tr300.exe" }
          )
          function Entries([string] $display) {
            @(
              Get-ItemProperty 'HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*' -ErrorAction SilentlyContinue
              Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*' -ErrorAction SilentlyContinue
            ) | Where-Object { $_.DisplayName -eq $display -and $_.WindowsInstaller -eq 1 }
          }
          foreach ($case in $cases) {
            foreach ($variant in @('newer-fixture', 'current', 'same-version-fixture')) {
              $msi = (Resolve-Path "target\wix-ci\$($case.Name)-$variant.msi").Path
              $process = Start-Process msiexec.exe -Wait -PassThru `
                -ArgumentList @('/i', $msi, '/qn', '/norestart')
              if ($process.ExitCode -ne 0) {
                throw "install failed for $msi with $($process.ExitCode)"
              }
            }
            $entries = @(Entries $case.Display)
            if ($entries.Count -ne 1) {
              throw "expected one $($case.Display) MSI registration, found $($entries.Count)"
            }
            if ($entries[0].DisplayVersion -ne $version) {
              throw "fresh older/same-version MSI did not win: $($entries[0].DisplayVersion)"
            }
            if (-not (Test-Path $case.Exe)) { throw "installed binary missing: $($case.Exe)" }
            $actualVersion = & $case.Exe --version 2>$null
            if ($actualVersion -ne "tr300 $version") {
              throw "installed binary version does not match $version"
            }
            $process = Start-Process msiexec.exe -Wait -PassThru `
              -ArgumentList @('/x', $entries[0].PSChildName, '/qn', '/norestart')
            if ($process.ExitCode -ne 0) {
              throw "uninstall failed for $($case.Display) with $($process.ExitCode)"
            }
          }
      - name: Compile Global and Corporate Inno Setup sources
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress --no-color
          $iscc = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $iscc)) { throw "iscc.exe not found" }
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          foreach ($source in @("inno\global.iss", "inno\corporate.iss")) {
            & $iscc "/DMyAppVersion=$version" $source
            if ($LASTEXITCODE -ne 0) { throw "Inno compile failed for $source" }
          }
